<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gia Phả – Dòng Họ Nguyễn Hữu (Thôn Kỳ Côi)</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #222; }

#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar {
  width: 360px; min-width: 260px; background: #1e293b; color: #e2e8f0;
  display: flex; flex-direction: column; z-index: 10; box-shadow: 3px 0 15px rgba(0,0,0,.3);
}
#tree-container { flex: 1; overflow: hidden; position: relative; background: #f8fafc; }

#sidebar-header {
  padding: 18px 16px 14px; background: #0f172a; border-bottom: 1px solid #334155;
}
#sidebar-header h1 { font-size: 15px; font-weight: 700; color: #f1f5f9; line-height: 1.4; }
#sidebar-header p  { font-size: 12px; color: #94a3b8; margin-top: 3px; }

#toolbar {
  padding: 8px 10px; display: flex; gap: 5px; flex-wrap: wrap;
  border-bottom: 1px solid #334155; background: #1e293b;
}
.btn {
  padding: 5px 10px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 11px; font-weight: 600; transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-primary   { background: #3b82f6; color: #fff; }
.btn-success   { background: #10b981; color: #fff; }
.btn-warning   { background: #f59e0b; color: #fff; }
.btn-danger    { background: #ef4444; color: #fff; }
.btn-secondary { background: #475569; color: #e2e8f0; }
.btn-active    { background: #7c3aed; color: #fff; }
.toolbar-sep   { width: 1px; background: #334155; margin: 2px 1px; align-self: stretch; }

#detail-panel { flex: 1; overflow-y: auto; padding: 14px 14px 20px; }
#person-info { display: none; }
#person-info .name { font-size: 17px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
#person-info .code { font-size: 11px; color: #64748b; margin-bottom: 10px; font-family: monospace; }
#person-info .badge {
  display: inline-block; padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600; margin-bottom: 10px;
}
.badge-male   { background: #1d4ed8; color: #bfdbfe; }
.badge-female { background: #9d174d; color: #fbcfe8; }
.info-row { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
.info-label { color: #64748b; min-width: 80px; }
.info-value { color: #e2e8f0; }
.spouse-card { background: #0f172a; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
.spouse-name { font-size: 13px; color: #c4b5fd; font-weight: 600; }
.spouse-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
#no-selection { text-align: center; padding: 40px 20px; color: #475569; font-size: 13px; }
#no-selection svg { opacity: .3; margin-bottom: 12px; }
#no-selection .hint { margin-top: 10px; font-size: 11px; color: #334155; }

#tree-svg { width: 100%; height: 100%; }
.link { fill: none; stroke: #cbd5e1; stroke-width: 1.5px; }
.node circle { cursor: pointer; }
.node.selected > circle { stroke: #fbbf24 !important; stroke-width: 4px !important; filter: drop-shadow(0 0 6px #fbbf24); }
.node text { font-size: 11px; pointer-events: none; font-family: 'Segoe UI', sans-serif; }
.label-name { fill: #1e293b; font-weight: 600; }
.label-code { fill: #94a3b8; font-size: 9px; }

#zoom-controls {
  position: absolute; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 4px;
}
#zoom-controls button {
  width: 36px; height: 36px; border: none; border-radius: 8px;
  background: #1e293b; color: #e2e8f0; font-size: 18px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.3); transition: background .15s;
}
#zoom-controls button:hover { background: #334155; }

#legend {
  position: absolute; top: 14px; left: 14px;
  background: rgba(255,255,255,.95); border-radius: 8px;
  padding: 8px 12px; font-size: 11px; box-shadow: 0 2px 8px rgba(0,0,0,.12);
  max-height: 80vh; overflow-y: auto;
}
.leg-section { font-weight: 700; color: #475569; margin: 6px 0 3px; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
.leg-section:first-child { margin-top: 0; }
.leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.leg-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #fff; border-radius: 12px; padding: 28px; width: 520px; max-width: 95vw;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.4);
}
.modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: #1e293b; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 7px;
  font-size: 13px; outline: none; transition: border-color .15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #3b82f6; }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
#spouses-container .spouse-entry {
  background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 8px;
  padding: 10px; margin-bottom: 8px; position: relative;
}
#spouses-container .spouse-entry .remove-spouse {
  position: absolute; top: 8px; right: 8px; background: #fee2e2;
  border: none; border-radius: 5px; color: #dc2626; cursor: pointer; font-size: 12px; padding: 2px 6px;
}
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>🌳 Gia Phả Dòng Họ Nguyễn Hữu</h1>
      <p>Thôn Kỳ Côi – Ngành I</p>
    </div>
    <div id="toolbar">
      <button class="btn btn-success" onclick="openAddModal(null)">+ Gốc</button>
      <button class="btn btn-primary" onclick="openAddModal(selectedNode)" id="btn-add-child" disabled>+ Con</button>
      <button class="btn btn-warning" onclick="openEditModal()" id="btn-edit" disabled>✏️ Sửa</button>
      <button class="btn btn-danger" onclick="deleteSelected()" id="btn-delete" disabled>🗑️</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-active"    id="btn-h" onclick="setOrientation('h')" title="Xoay ngang">↔ Ngang</button>
      <button class="btn btn-secondary" id="btn-v" onclick="setOrientation('v')" title="Xoay dọc">↕ Dọc</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-secondary" onclick="collapseAll()" title="Thu gọn tất cả">⊟ Thu gọn</button>
      <button class="btn btn-secondary" onclick="expandAll()"   title="Mở rộng tất cả">⊞ Mở rộng</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-secondary" onclick="exportData()">💾 Xuất</button>
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📂 Nhập</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
    <div id="detail-panel">
      <div id="no-selection">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <p>Bấm vào một người để xem chi tiết</p>
        <p class="hint">Double-click để thu gọn / mở rộng nhánh</p>
      </div>
      <div id="person-info">
        <div class="name" id="pi-name"></div>
        <div class="code" id="pi-code"></div>
        <span class="badge" id="pi-gender"></span>
        <div class="info-row"><span class="info-label">Năm sinh:</span><span class="info-value" id="pi-born"></span></div>
        <div class="info-row"><span class="info-label">Năm mất:</span><span class="info-value" id="pi-died"></span></div>
        <div class="info-row"><span class="info-label">Ghi chú:</span><span class="info-value" id="pi-note"></span></div>
        <div style="margin-top:12px">
          <div style="font-size:12px;color:#64748b;font-weight:600;margin-bottom:6px">VỢ / CHỒNG</div>
          <div id="pi-spouses"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tree-container">
    <svg id="tree-svg"></svg>
    <div id="legend">
      <div class="leg-section">Giới tính</div>
      <div class="leg-row"><span style="font-size:14px;line-height:1">♂</span> Nam</div>
      <div class="leg-row"><span style="font-size:14px;line-height:1">♀</span> Nữ</div>
      <div class="leg-row"><span class="leg-dot" style="background:#94a3b8"></span> Đã mất</div>
      <div class="leg-row">
        <span class="leg-dot" style="background:transparent;border:2.5px solid #fbbf24;box-sizing:border-box"></span> Đang chọn
      </div>
      <div class="leg-section">Màu theo đời</div>
      <div id="gen-legend"></div>
      <div class="leg-section">Thu gọn</div>
      <div class="leg-row"><span class="leg-dot" style="background:#22c55e"></span> Có con (mở)</div>
      <div class="leg-row"><span class="leg-dot" style="background:#f59e0b"></span> Có con (đóng)</div>
    </div>
    <div id="zoom-controls">
      <button onclick="zoomIn()">+</button>
      <button onclick="resetZoom()">⌂</button>
      <button onclick="zoomOut()">−</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Thêm thành viên mới</h3>
    <input type="hidden" id="form-id">
    <input type="hidden" id="form-parent-id">
    <div class="form-row">
      <div class="form-group">
        <label>Họ và tên *</label>
        <input type="text" id="form-name" placeholder="Nguyễn Văn A">
      </div>
      <div class="form-group" style="max-width:130px">
        <label>Giới tính *</label>
        <select id="form-gender">
          <option value="male">Nam</option>
          <option value="female">Nữ</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Mã đời (code)</label>
      <input type="text" id="form-code" placeholder="ĐT8/N1C3/...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Năm sinh</label>
        <input type="text" id="form-born" placeholder="1950">
      </div>
      <div class="form-group">
        <label>Năm mất</label>
        <input type="text" id="form-died" placeholder="(để trống nếu còn sống)">
      </div>
    </div>
    <div class="form-group">
      <label>Ghi chú</label>
      <textarea id="form-note" rows="2" placeholder="Thông tin thêm..."></textarea>
    </div>
    <div class="form-group">
      <label>Vợ / Chồng</label>
      <div id="spouses-container"></div>
      <button class="btn btn-secondary" style="margin-top:6px;font-size:12px" onclick="addSpouseField()">+ Thêm vợ/chồng</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="saveForm()">Lưu</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let treeData    = JSON.parse(JSON.stringify(FAMILY_DATA));
let selectedNode = null;
let svgEl, g, zoom, root;
let orientation  = 'h'; // 'h' = horizontal, 'v' = vertical
const collapsed  = new Set(); // node IDs that are collapsed

const NODE_R = 14;

// Generation color palette (depth 0 … 11, then cycles)
const GEN_COLORS = [
  '#6d28d9','#1e40af','#0369a1','#047857',
  '#b45309','#be123c','#0f766e','#7e22ce',
  '#c2410c','#0284c7','#15803d','#a21caf'
];
// Stroke = slightly darker
let GEN_STROKES = [];
window.addEventListener('DOMContentLoaded', () => {
  GEN_STROKES = GEN_COLORS.map(c => d3.color(c).darker(0.7).formatHex());
});

function genFill(d) {
  if (d.data.yearDied) return '#94a3b8';
  return GEN_COLORS[d.depth % GEN_COLORS.length];
}
function genStroke(d) {
  if (d.data.yearDied) return '#475569';
  return GEN_STROKES.length ? GEN_STROKES[d.depth % GEN_STROKES.length] : '#000';
}

// ── Utilities ──────────────────────────────────────────────────────────────
function uid() { return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

function findNode(data, id) {
  if (data.id === id) return data;
  for (const c of (data.children || [])) { const r = findNode(c, id); if (r) return r; }
  return null;
}

function removeNode(data, id) {
  if (!data.children) return;
  data.children = data.children.filter(c => c.id !== id);
  for (const c of data.children) removeNode(c, id);
}

function collectIds(node, skipRoot) {
  if (!skipRoot && node.children && node.children.length) collapsed.add(node.id);
  for (const c of (node.children || [])) collectIds(c, false);
}

// ── Collapse / Expand ──────────────────────────────────────────────────────
function collapseAll() {
  collapsed.clear();
  // collapse all non-root nodes that have children
  for (const c of (treeData.children || [])) collectIds(c, false);
  renderTree(); fitTree();
}
function expandAll() { collapsed.clear(); renderTree(); setTimeout(fitTree, 50); }

function toggleCollapse(id) {
  const orig = findNode(treeData, id);
  if (!orig || !orig.children || !orig.children.length) return;
  if (collapsed.has(id)) collapsed.delete(id); else collapsed.add(id);
  renderTree();
}

// ── Orientation ────────────────────────────────────────────────────────────
function setOrientation(o) {
  orientation = o;
  document.getElementById('btn-h').className = 'btn ' + (o==='h' ? 'btn-active' : 'btn-secondary');
  document.getElementById('btn-v').className = 'btn ' + (o==='v' ? 'btn-active' : 'btn-secondary');
  renderTree(); fitTree();
}

// ── Tree rendering ─────────────────────────────────────────────────────────
function initTree() {
  svgEl = d3.select('#tree-svg');
  svgEl.selectAll('*').remove();
  GEN_STROKES = GEN_COLORS.map(c => d3.color(c).darker(0.7).formatHex());
  zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', e => g.attr('transform', e.transform));
  svgEl.call(zoom);
  g = svgEl.append('g');
  renderTree();
  setTimeout(fitTree, 80);
}

function renderTree() {
  if (!g) return;
  g.selectAll('*').remove();

  const isH = orientation === 'h';

  const hier = d3.hierarchy(treeData, d =>
    collapsed.has(d.id) ? null : (d.children && d.children.length ? d.children : null)
  );

  const layout = isH
    ? d3.tree().nodeSize([38, 220])
    : d3.tree().nodeSize([130, 120]);

  root = layout(hier);

  // Links
  const linkGen = isH
    ? d3.linkHorizontal().x(d => d.y).y(d => d.x)
    : d3.linkVertical().x(d => d.x).y(d => d.y);

  g.selectAll('.link')
    .data(root.links())
    .enter().append('path')
    .attr('class', 'link')
    .attr('d', linkGen);

  // Nodes
  const node = g.selectAll('.node')
    .data(root.descendants())
    .enter().append('g')
    .attr('class', d => 'node' + (selectedNode && d.data.id === selectedNode.id ? ' selected' : ''))
    .attr('transform', d => isH ? `translate(${d.y},${d.x})` : `translate(${d.x},${d.y})`)
    .style('cursor', 'pointer')
    .on('click',    (e, d) => { e.stopPropagation(); selectPerson(d.data); })
    .on('dblclick', (e, d) => { e.stopPropagation(); toggleCollapse(d.data.id); });

  // Circle (main)
  node.append('circle')
    .attr('r', NODE_R)
    .style('fill',         d => genFill(d))
    .style('stroke',       d => genStroke(d))
    .style('stroke-width', d => selectedNode && d.data.id === selectedNode.id ? '4px' : '2.5px');

  // Gender icon
  node.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.38em')
    .style('font-size', '13px')
    .style('fill', '#fff')
    .style('pointer-events', 'none')
    .text(d => d.data.gender === 'female' ? '♀' : '♂');

  // Collapse indicator dot (only for nodes that have children in the original data)
  node.each(function(d) {
    const orig = findNode(treeData, d.data.id);
    if (!orig || !orig.children || !orig.children.length) return;
    const isCollapsed = collapsed.has(d.data.id);
    const cx = isH ? NODE_R : 0;
    const cy = isH ? 0 : NODE_R;
    const id = d.data.id;

    d3.select(this).append('circle')
      .attr('r', 6)
      .attr('cx', cx)
      .attr('cy', cy)
      .style('fill', isCollapsed ? '#f59e0b' : '#22c55e')
      .style('stroke', '#fff')
      .style('stroke-width', '1.5px')
      .style('cursor', 'pointer')
      .on('click', e => { e.stopPropagation(); toggleCollapse(id); });

    d3.select(this).append('text')
      .attr('text-anchor', 'middle')
      .attr('x', cx)
      .attr('y', cy)
      .attr('dy', '0.38em')
      .style('font-size', '9px')
      .style('fill', '#fff')
      .style('pointer-events', 'none')
      .text(isCollapsed ? '▶' : '▼');
  });

  // Name + code labels
  if (isH) {
    node.append('text')
      .attr('class', 'label-name')
      .attr('x', NODE_R + 8)
      .attr('dy', '-0.25em')
      .attr('dominant-baseline', 'auto')
      .text(d => d.data.name.length > 22 ? d.data.name.slice(0,22) + '…' : d.data.name);

    node.append('text')
      .attr('class', 'label-code')
      .attr('x', NODE_R + 8)
      .attr('dy', '1em')
      .attr('dominant-baseline', 'auto')
      .text(d => d.data.code || '');
  } else {
    node.append('text')
      .attr('class', 'label-name')
      .attr('text-anchor', 'middle')
      .attr('y', NODE_R + 5)
      .attr('dy', '1em')
      .text(d => d.data.name.length > 14 ? d.data.name.slice(0,14) + '…' : d.data.name);

    node.append('text')
      .attr('class', 'label-code')
      .attr('text-anchor', 'middle')
      .attr('y', NODE_R + 5)
      .attr('dy', '2.3em')
      .text(d => { const c = d.data.code||''; return c.length>12 ? c.slice(0,12)+'…':c; });
  }

  // Update generation legend
  const maxDepth = Math.max(...root.descendants().map(d => d.depth));
  const gl = document.getElementById('gen-legend');
  gl.innerHTML = '';
  for (let i = 0; i <= Math.min(maxDepth, GEN_COLORS.length - 1); i++) {
    const row = document.createElement('div');
    row.className = 'leg-row';
    row.innerHTML = `<span class="leg-dot" style="background:${GEN_COLORS[i]}"></span> ${i===0?'Gốc':'Đời '+i}`;
    gl.appendChild(row);
  }
}

function fitTree() {
  if (!root) return;
  const isH = orientation === 'h';
  const nodes = root.descendants();
  const xs = nodes.map(n => isH ? n.y : n.x);
  const ys = nodes.map(n => isH ? n.x : n.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const cw = document.getElementById('tree-container').clientWidth;
  const ch = document.getElementById('tree-container').clientHeight;
  const pad = 80;
  const scale = Math.min(
    (cw - pad*2) / Math.max(maxX - minX, 1),
    (ch - pad*2) / Math.max(maxY - minY, 1),
    1.5
  );
  const tx = cw/2 - (minX + maxX)/2 * scale;
  const ty = ch/2 - (minY + maxY)/2 * scale;
  svgEl.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ── Zoom ───────────────────────────────────────────────────────────────────
function zoomIn()    { svgEl.transition().call(zoom.scaleBy, 1.35); }
function zoomOut()   { svgEl.transition().call(zoom.scaleBy, 0.74); }
function resetZoom() { fitTree(); }

// ── Selection ──────────────────────────────────────────────────────────────
function selectPerson(data) {
  selectedNode = data;
  renderTree();
  showDetail(data);
  document.getElementById('btn-add-child').disabled = false;
  document.getElementById('btn-edit').disabled = false;
  document.getElementById('btn-delete').disabled = (data.id === 'root');
}

function showDetail(d) {
  document.getElementById('no-selection').style.display = 'none';
  document.getElementById('person-info').style.display  = 'block';
  document.getElementById('pi-name').textContent = d.name;
  document.getElementById('pi-code').textContent = d.code || '';
  const gb = document.getElementById('pi-gender');
  gb.textContent = d.gender === 'female' ? '♀ Nữ' : '♂ Nam';
  gb.className   = 'badge ' + (d.gender === 'female' ? 'badge-female' : 'badge-male');
  document.getElementById('pi-born').textContent = d.yearBorn || '—';
  document.getElementById('pi-died').textContent = d.yearDied || '(còn sống)';
  document.getElementById('pi-note').textContent = d.note   || '—';
  const sc = document.getElementById('pi-spouses');
  sc.innerHTML = '';
  (d.spouses || []).forEach(s => {
    const div = document.createElement('div');
    div.className = 'spouse-card';
    div.innerHTML = `<div class="spouse-name">${s.name}</div>`
      + (s.origin ? `<div class="spouse-meta">📍 ${s.origin}</div>` : '')
      + (s.note   ? `<div class="spouse-meta">📝 ${s.note}</div>`   : '');
    sc.appendChild(div);
  });
  if (!d.spouses || !d.spouses.length)
    sc.innerHTML = '<div style="color:#475569;font-size:12px">Chưa có thông tin</div>';
}

// ── Add / Edit ─────────────────────────────────────────────────────────────
function openAddModal(parentData) {
  document.getElementById('modal-title').textContent = 'Thêm thành viên mới';
  document.getElementById('form-id').value        = uid();
  document.getElementById('form-parent-id').value = parentData ? parentData.id : '';
  ['form-name','form-code','form-born','form-died','form-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('form-gender').value = 'male';
  document.getElementById('spouses-container').innerHTML = '';
  document.getElementById('modal-overlay').classList.add('active');
}

function openEditModal() {
  if (!selectedNode) return;
  const d = selectedNode;
  document.getElementById('modal-title').textContent = 'Sửa thông tin';
  document.getElementById('form-id').value        = d.id;
  document.getElementById('form-parent-id').value = '';
  document.getElementById('form-name').value   = d.name     || '';
  document.getElementById('form-gender').value = d.gender   || 'male';
  document.getElementById('form-code').value   = d.code     || '';
  document.getElementById('form-born').value   = d.yearBorn || '';
  document.getElementById('form-died').value   = d.yearDied || '';
  document.getElementById('form-note').value   = d.note     || '';
  const sc = document.getElementById('spouses-container');
  sc.innerHTML = '';
  (d.spouses || []).forEach(s => addSpouseField(s));
  document.getElementById('modal-overlay').classList.add('active');
}

function addSpouseField(s) {
  const sc = document.getElementById('spouses-container');
  const div = document.createElement('div');
  div.className = 'spouse-entry';
  div.innerHTML = `
    <button class="remove-spouse" onclick="this.parentElement.remove()">✕</button>
    <div class="form-group" style="margin-bottom:6px">
      <label>Tên vợ/chồng</label>
      <input type="text" class="sp-name" placeholder="Họ và tên" value="${s ? s.name : ''}">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label>Quê quán</label>
        <input type="text" class="sp-origin" placeholder="Làng, xã..." value="${s ? s.origin : ''}">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Ghi chú</label>
        <input type="text" class="sp-note" placeholder="Vợ 1, Vợ 2..." value="${s ? s.note : ''}">
      </div>
    </div>`;
  sc.appendChild(div);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function saveForm() {
  const id       = document.getElementById('form-id').value;
  const parentId = document.getElementById('form-parent-id').value;
  const name     = document.getElementById('form-name').value.trim();
  if (!name) { alert('Vui lòng nhập họ và tên.'); return; }

  const spouses = [];
  document.querySelectorAll('#spouses-container .spouse-entry').forEach(el => {
    const n = el.querySelector('.sp-name').value.trim();
    if (n) spouses.push({ name: n, origin: el.querySelector('.sp-origin').value.trim(), note: el.querySelector('.sp-note').value.trim() });
  });

  const person = {
    id, name,
    gender:   document.getElementById('form-gender').value,
    code:     document.getElementById('form-code').value.trim(),
    yearBorn: document.getElementById('form-born').value.trim() || null,
    yearDied: document.getElementById('form-died').value.trim() || null,
    note:     document.getElementById('form-note').value.trim(),
    spouses, children: []
  };

  const existing = findNode(treeData, id);
  if (existing) {
    Object.assign(existing, { ...person, children: existing.children });
    selectedNode = existing;
  } else {
    if (parentId) {
      const parent = findNode(treeData, parentId);
      if (parent) { if (!parent.children) parent.children = []; parent.children.push(person); collapsed.delete(parentId); }
    } else {
      if (!treeData.children) treeData.children = [];
      treeData.children.push(person);
    }
    selectedNode = person;
  }
  closeModal(); renderTree(); if (selectedNode) showDetail(selectedNode);
}

// ── Delete ─────────────────────────────────────────────────────────────────
function deleteSelected() {
  if (!selectedNode || selectedNode.id === 'root') return;
  const node = findNode(treeData, selectedNode.id);
  const cc = (node && node.children) ? node.children.length : 0;
  if (!confirm(cc > 0 ? `Xóa "${selectedNode.name}" sẽ xóa luôn ${cc} con cháu. Tiếp tục?` : `Xóa "${selectedNode.name}"?`)) return;
  removeNode(treeData, selectedNode.id);
  collapsed.delete(selectedNode.id);
  selectedNode = null;
  document.getElementById('person-info').style.display  = 'none';
  document.getElementById('no-selection').style.display = 'block';
  ['btn-add-child','btn-edit','btn-delete'].forEach(id => document.getElementById(id).disabled = true);
  renderTree();
}

// ── Import / Export ────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(treeData, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'giapha_nguyen_huu.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      treeData = JSON.parse(ev.target.result);
      selectedNode = null; collapsed.clear();
      document.getElementById('person-info').style.display  = 'none';
      document.getElementById('no-selection').style.display = 'block';
      ['btn-add-child','btn-edit','btn-delete'].forEach(id => document.getElementById(id).disabled = true);
      renderTree(); fitTree();
    } catch { alert('File JSON không hợp lệ.'); }
  };
  reader.readAsText(file); e.target.value = '';
}

document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
window.addEventListener('load', initTree);
window.addEventListener('resize', initTree);
</script>
</body>
